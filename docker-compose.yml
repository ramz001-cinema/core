services:
  postgres:
    container_name: postgres
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - global
  redis:
    image: redis/redis-stack:latest
    restart: always
    container_name: redis-stack
    ports:
      - "6379:6379"
      - "8001:8001" # web UI
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD}
    networks:
      - global

volumes:
  postgres_data:
  redis_data:

networks:
  global:
